<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Today — every day counts</title>
    <meta name="description" content="A finite-time journal. Confronts you with how much life is left so today doesn't slip by." />
    <meta name="author" content="Today Little Log" />
    <meta name="application-name" content="Today Little Log" />
    <meta name="robots" content="index, follow" />

    <!-- Preconnect + non-blocking font load. psi-swarm flagged the chained
         Google-Fonts CSS @import as ~829ms wasted on mobile-slow + the
         posthog endpoint as another ~340ms. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://us-assets.i.posthog.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      />
    </noscript>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#e86a1f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Today Little Log" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:title" content="Today Little Log — score your day in 30 seconds" />
    <meta property="og:description" content="A personal daily scoreboard. Define what a good day looks like — sleep, exercise, focus — log it each day, and see your score against ideal. Journal, AM/PM rituals, and a memento-mori life grid. Installable PWA." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Today Little Log" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta property="og:image:alt" content="Today Little Log daily scoreboard preview" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Today Little Log — score your day in 30 seconds" />
    <meta name="twitter:description" content="A personal daily scoreboard. Define what a good day looks like, log it each day, and see your score against ideal. No guilt, no 27 dashboards. Installable PWA." />
    <meta name="twitter:image" content="/pwa-512x512.png" />
  </head>

  <body>
    <!--
      LCP-skeleton prerender. Vite gives us a pure SPA shell; the LCP element
      (the hero <p>) used to wait for the entire React tree to hydrate before
      first paint, costing ~600-700ms on desktop.

      The skeleton below renders the exact LCP text inside #root with inline
      styles so it paints immediately after CSS, before the deferred module
      script executes. React's createRoot.render() then replaces these
      children on mount — visually identical because the live HomeHero uses
      the same copy. Same content, ~1s earlier paint.
    -->
    <div id="root">
      <section style="margin:1rem auto 0;max-width:64rem;padding:0 1rem;">
        <div
          style="border-radius:1rem;border:1px solid rgba(0,0,0,0.08);background:#fff;padding:1.25rem;box-shadow:0 1px 2px rgba(0,0,0,0.04);"
        >
          <p style="margin:0;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.18em;color:#e86a1f;">
            Today Little Log
          </p>
          <h1 style="margin:0.5rem 0 0;font-size:1.5rem;font-weight:800;line-height:1.2;letter-spacing:-0.01em;color:#111;">
            Write one line about your day. Every day.
          </h1>
          <p style="margin:0.75rem 0 0;max-width:65ch;font-size:0.875rem;line-height:1.55;color:#666;">
            A tiny daily log. Fill in what you did — sleep, exercise, focus — and get a score.
            Look back at how your month actually went. No guilt, no 27 dashboards.
          </p>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
